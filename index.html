<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUXE.CLOSET</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
margin:0;
}

header{
text-align:center;
padding:20px;
font-size:24px;
color:#9CAF88;
text-shadow:0 0 10px #9CAF88;
}

/* الشريط العلوي */
.top-bar{
text-align:center;
padding:12px;
font-size:16px;
font-weight:bold;
color:black;
background:#9CAF88;
letter-spacing:1px;
position:sticky;
top:0;
z-index:999;
animation:slideGlow 2s infinite alternate;
}

@keyframes slideGlow{
from{
box-shadow:0 0 10px #9CAF88;
}
to{
box-shadow:0 0 25px #9CAF88;
}
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
gap:15px;
padding:15px;
}

.card{
background:#111;
border-radius:20px;
padding:15px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(156,175,136,0.4);

display:flex;
flex-direction:column;
justify-content:space-between;
}

.img-box{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border-radius:15px;
}

.img-box img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.img-box:hover img{
transform:scale(1.1);
}

.price{
color:#9CAF88;
font-size:20px;
}

.old{
text-decoration:line-through;
color:gray;
}

.sizes{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.sizes button{
width:45px;
height:45px;
border-radius:50%;
border:1px solid #555;
background:#0a0a0a;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.sizes button.active{
background:#9CAF88;
color:black;
box-shadow:0 0 15px #9CAF88;
transform:scale(1.1);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#9CAF88;
color:black;
font-weight:bold;
margin-top:10px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #9CAF88;}
50%{box-shadow:0 0 25px #9CAF88;}
100%{box-shadow:0 0 10px #9CAF88;}
}

@media(max-width:600px){
.container{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<!-- الشريط العلوي -->
<div class="top-bar">
🚚 توصيل مجاني إلى 58 ولاية لفترة محدودة 🔥
</div>

<header>LUXE.CLOSET.DZ</header>

<div class="container">

<!-- المنتج 1 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg">
</div>

<h3>إنتهت الكمية </h3>
<span class="old">2800 DA</span>
<div class="price">2500 DA</div>

<div id="sizes-1" class="sizes">
<button onclick="selectSize(this,'S',1)">S</button>
<button onclick="selectSize(this,'M',1)">M</button>
<button onclick="selectSize(this,'L',1)">L</button>
</div>

<button id="orderBtn-1"
data-name="T-shirt"
data-img="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg"
data-price="2500 DA"
onclick="goOrder(this,1)">
🛒 اطلب الآن
</button>
</div>

</div>

<script>
function selectSize(btn, size, productId){

document.querySelectorAll(`#sizes-${productId} button`).forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

document.getElementById(`orderBtn-${productId}`).dataset.size = size;
}

function goOrder(btn, productId){

let size = btn.dataset.size;

if(!size){
alert("اختار المقاس أولاً!");
return;
}

let name = btn.dataset.name;
let img = btn.dataset.img;
let price = btn.dataset.price;

window.location.href =
`order.html?name=${encodeURIComponent(name)}&img=${encodeURIComponent(img)}&price=${encodeURIComponent(price)}&size=${encodeURIComponent(size)}`;
}
</script>

</body>
